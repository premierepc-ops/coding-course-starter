{% extends "base.html" %}

{% block title %}Sign in{% endblock %}

{% block content %}
<h1>Sign in</h1>

{% if show_instructor %}
  <p>Instructor login</p>
  <form method="post">
    <input type="hidden" name="instructor" value="1">
    <label>
      Password
      <input type="password" name="password" required autofocus>
    </label>
    <button type="submit">Sign in as instructor</button>
  </form>
  <p><a href="{{ url_for('course_auth.login') }}">← Student sign-in</a></p>
{% else %}
  <p>Pick your name to open the quiz dashboard.</p>
  <form method="post">
    <label>
      I am
      <select name="slug" required>
        <option value="">Choose…</option>
        {% for learner in learners %}
        <option value="{{ learner.slug }}">{{ learner.name }}</option>
        {% endfor %}
      </select>
    </label>
    <button type="submit">Continue</button>
  </form>
  <p><a href="{{ url_for('course_auth.login', instructor=1) }}">Instructor login</a></p>
{% endif %}
{% endblock %}
