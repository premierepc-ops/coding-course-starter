name: Deploy to Railway

# Student repo pushes deploy to the instructor's Railway project via a project token.
# No Railway account for the student — only RAILWAY_TOKEN in GitHub repo secrets.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: railway up --service web --detach
