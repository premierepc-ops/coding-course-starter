<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="byte-title">
  <title id="byte-title">Byte, your course guide</title>
  <defs>
    <linearGradient id="byte-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9632"/>
      <stop offset="100%" stop-color="#ff7700"/>
    </linearGradient>
  </defs>
  <!-- shadow -->
  <ellipse cx="60" cy="108" rx="28" ry="6" fill="#111827" opacity="0.12"/>
  <!-- body -->
  <rect x="28" y="32" width="64" height="58" rx="16" fill="url(#byte-body)"/>
  <!-- face panel -->
  <rect x="36" y="42" width="48" height="34" rx="10" fill="#fff7ed"/>
  <!-- eyes -->
  <circle cx="50" cy="58" r="5" fill="#111827"/>
  <circle cx="70" cy="58" r="5" fill="#111827"/>
  <circle cx="52" cy="56" r="1.5" fill="#fff"/>
  <circle cx="72" cy="56" r="1.5" fill="#fff"/>
  <!-- smile -->
  <path d="M46 68 Q60 78 74 68" fill="none" stroke="#111827" stroke-width="2.5" stroke-linecap="round"/>
  <!-- antenna -->
  <rect x="57" y="18" width="6" height="16" rx="3" fill="#e56a00"/>
  <circle cx="60" cy="14" r="7" fill="#ff7700"/>
  <circle cx="60" cy="14" r="3" fill="#fff7ed"/>
  <!-- arms -->
  <rect x="14" y="52" width="14" height="8" rx="4" fill="#e56a00"/>
  <rect x="92" y="52" width="14" height="8" rx="4" fill="#e56a00"/>
  <!-- feet -->
  <rect x="38" y="88" width="16" height="10" rx="5" fill="#e56a00"/>
  <rect x="66" y="88" width="16" height="10" rx="5" fill="#e56a00"/>
  <!-- code brackets on chest -->
  <text x="60" y="92" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#fff7ed">&lt;/&gt;</text>
</svg>
